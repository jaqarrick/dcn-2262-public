apiVersion: apps/v1
kind: Deployment
metadata:
  name: as-deployment
  labels:
    app: as
spec:
  replicas: 1
  selector:
    matchLabels:
      app: as
  template:
    metadata:
      labels:
        app: as
    spec:
      containers:
        - name: as
          image: jpcarrick/dns-as:1.4
          ports:
            - containerPort: 53533
              protocol: UDP
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
          env:
            - name: AS_PORT
              value: "53533"
            - name: DB_PATH
              value: /app/data/dns.db
          volumeMounts:
            - name: db-storage
              mountPath: /app/data
      volumes:
        - name: db-storage
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: as-service
spec:
  type: NodePort
  selector:
    app: as
  ports:
    - protocol: UDP
      port: 53533
      targetPort: 53533
      nodePort: 30001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fs-deployment
  labels:
    app: fs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fs
  template:
    metadata:
      labels:
        app: fs
    spec:
      containers:
        - name: fs
          image: jpcarrick/dns-fs:1.0
          ports:
            - containerPort: 9090
              protocol: TCP
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
          env:
            - name: FLASK_RUN_PORT
              value: "9090"
---
apiVersion: v1
kind: Service
metadata:
  name: fs-service
spec:
  type: NodePort
  selector:
    app: fs
  ports:
    - protocol: TCP
      port: 9090
      targetPort: 9090
      nodePort: 30002
---
